name: Prisma Migrate Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/prisma/**"

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ github.workspace }}

      - name: Generate Prisma client
        run: bunx prisma@5.22.0 generate --schema prisma/schema.prisma

      - name: Deploy migrations
        run: bunx prisma@5.22.0 migrate deploy --schema prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL || secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_DATABASE_URL || secrets.DIRECT_URL }}
