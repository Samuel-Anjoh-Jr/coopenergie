name: Prisma Migrate Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/prisma/**"

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Deploy migrations
        run: bunx prisma@5.22.0 migrate deploy --schema prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL || secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_DATABASE_URL || secrets.DIRECT_URL }}

      - name: Verify migrations recreate schema.prisma on production DB
        run: |
          bunx prisma@5.22.0 migrate diff \
            --from-url "$DIRECT_URL" \
            --to-schema-datamodel prisma/schema.prisma \
            --exit-code
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL || secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_DATABASE_URL || secrets.DIRECT_URL }}
