name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Lint (web + backend)
        run: bun lint

      - name: Typecheck (web + backend)
        run: bun typecheck

  deploy-backend-staging:
    runs-on: ubuntu-latest
    needs: validate
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_STAGING_SERVICE: ${{ secrets.RAILWAY_STAGING_SERVICE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Build backend Docker image
        run: docker build -f apps/backend/Dockerfile -t coopenergie-backend:staging apps/backend

      - name: Deploy backend to Railway staging
        run: bunx @railway/cli@latest up --service "$RAILWAY_STAGING_SERVICE" --detach

      - name: Run Prisma migrate deploy (staging)
        if: contains(toJson(github.event.commits), 'apps/backend/prisma/')
        run: bunx prisma migrate deploy --schema apps/backend/prisma/schema.prisma

  deploy-web-staging:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy web to Vercel staging alias
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/web
          vercel-args: "--prod=false"
          alias-domains: ${{ secrets.VERCEL_STAGING_ALIAS }}
