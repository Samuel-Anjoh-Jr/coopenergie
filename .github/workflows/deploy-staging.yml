name: Deploy Staging

on:
  push:
    branches:
      - dev

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Lint (web + backend)
        run: bun lint

      - name: Typecheck (web + backend)
        run: bun typecheck

  # Backend is deployed automatically by Railway's GitHub branch integration.
  # Railway watches the dev branch and rebuilds on every push — no CLI needed.
  # To run staging migrations after a schema change, use Railway dashboard →
  # "Run command" → `bun run prisma migrate deploy --schema prisma/schema.prisma`
