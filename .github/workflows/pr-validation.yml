name: PR Validation

on:
  pull_request:
    branches:
      - "**"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Lint (web + backend)
        run: bun lint

      - name: Typecheck (web + backend)
        run: bun typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Build web
        env:
          NEXTAUTH_SECRET: dummy-secret
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coopenergie
        run: bun run build:web

      - name: Build backend
        run: bun run build:api

  compile-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install contracts dependencies
        run: cd contracts && bun install

      - name: Compile contracts
        run: cd contracts && bun run compile
