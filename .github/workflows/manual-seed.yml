name: Manual Seed Production

# Connects directly to Supabase using DATABASE_URL.
# Set the following secret in GitHub → Settings → Secrets → Actions:
#   DATABASE_URL — Supabase direct connection URL (Settings → Database → Connection string → URI)
#                  Use the direct URL (port 5432), not the pooler URL.

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type CONFIRM to proceed"
        required: true
        type: string

jobs:
  seed:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirmation == 'CONFIRM'
    env:
      DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL || secrets.DIRECT_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_DATABASE_URL || secrets.DIRECT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bunx prisma@5.22.0 generate --schema apps/backend/prisma/schema.prisma

      - name: Run database seed
        run: bun run db:seed
        working-directory: apps/backend
