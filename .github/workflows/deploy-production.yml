name: Deploy Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Lint (web + backend)
        run: bun lint

      - name: Typecheck (web + backend)
        run: bun typecheck

  deploy-contracts:
    runs-on: ubuntu-latest
    needs: validate
    if: contains(toJson(github.event.commits), 'contracts/')
    env:
      CELO_RELAYER_PRIVATE_KEY: ${{ secrets.CELO_RELAYER_PRIVATE_KEY }}
      # Set Repository Variable CONTRACTS_NETWORK to either:
      # - celoSepolia (recommended default for now)
      # - celo (mainnet)
      CONTRACTS_NETWORK: ${{ vars.CONTRACTS_NETWORK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install contracts dependencies
        run: cd contracts && bun install

      - name: Deploy contracts to selected Celo network
        run: |
          cd contracts
          NETWORK="${CONTRACTS_NETWORK:-celoSepolia}"
          if [ "$NETWORK" = "celo" ]; then
            bun run deploy:mainnet
          elif [ "$NETWORK" = "celoSepolia" ]; then
            bun run deploy:celoSepolia
          else
            echo "Invalid CONTRACTS_NETWORK: $NETWORK"
            echo "Expected one of: celo, celoSepolia"
            exit 1
          fi

      - name: Print env vars to update in Railway / Vercel
        run: |
          NETWORK="${CONTRACTS_NETWORK:-celoSepolia}"
          FILE="contracts/deployments/${NETWORK}.json"
          FACTORY=$(jq -r '.CoopFactory' "$FILE")
          RELAYER=$(jq -r '.GasRelayer' "$FILE")
          {
            echo "## Contract addresses deployed — update your env vars"
            echo '```'
            echo "COOP_FACTORY_ADDRESS=${FACTORY}"
            echo "GAS_RELAYER_ADDRESS=${RELAYER}"
            echo '```'
            echo "> Set these in Railway (Variables tab) and Vercel (Environment Variables) then redeploy."
          } >> "$GITHUB_STEP_SUMMARY"

  # Backend is deployed automatically by Railway's GitHub branch integration.
  # No Railway CLI or secrets are needed — Railway watches the main branch and
  # rebuilds the Docker image (apps/backend/Dockerfile) on every push.

  db-migrate:
    runs-on: ubuntu-latest
    needs: validate
    if: contains(toJson(github.event.commits), 'apps/backend/prisma')
    env:
      # Supabase direct connection URL (port 5432, not the pooler).
      # Set in GitHub → Settings → Secrets → Actions → DATABASE_URL
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema.prisma

      - name: Run Prisma migrate deploy
        run: bunx prisma migrate deploy --schema apps/backend/prisma/schema.prisma

  deploy-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy web to Vercel production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/web
          vercel-args: "--prod"

  notify-success:
    runs-on: ubuntu-latest
    needs:
      - deploy-web
      - deploy-contracts
      - db-migrate
    if: always() && needs.deploy-web.result == 'success' && (needs.deploy-contracts.result == 'success' || needs.deploy-contracts.result == 'skipped') && (needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped')
    steps:
      - name: Write deployment summary
        run: |
          {
            echo "## Production Deployment Summary"
            echo "- Backend: auto-deployed by Railway (branch integration)"
            echo "- DB Migrations: ${{ needs.db-migrate.result }}"
            echo "- Web: ${{ needs.deploy-web.result }}"
            echo "- Contracts: ${{ needs.deploy-contracts.result }}"
            echo "- Trigger: ${{ github.sha }}"
            echo "- Actor: ${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"
