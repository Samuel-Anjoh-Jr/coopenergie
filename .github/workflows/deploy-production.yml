name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Lint (web + backend)
        run: bun lint

      - name: Typecheck (web + backend)
        run: bun typecheck

  deploy-contracts:
    runs-on: ubuntu-latest
    needs: validate
    if: contains(toJson(github.event.commits), 'contracts/')
    env:
      CELO_RELAYER_PRIVATE_KEY: ${{ secrets.CELO_RELAYER_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install contracts dependencies
        run: cd contracts && bun install

      - name: Deploy contracts to mainnet
        run: cd contracts && bun run deploy:mainnet

  deploy-backend:
    runs-on: ubuntu-latest
    needs: validate
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PRODUCTION_SERVICE: ${{ secrets.RAILWAY_PRODUCTION_SERVICE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Deploy backend to Railway production
        run: bunx @railway/cli@latest up --service "$RAILWAY_PRODUCTION_SERVICE" --detach

      - name: Run Prisma migrate deploy (production)
        if: contains(toJson(github.event.commits), 'apps/backend/prisma/schema.prisma') || contains(toJson(github.event.commits), 'apps/backend/prisma/migrations/')
        run: bunx prisma migrate deploy --schema apps/backend/prisma/schema.prisma

  deploy-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy web to Vercel production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/web
          vercel-args: "--prod"

  notify-success:
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-web
      - deploy-contracts
    if: always() && needs.deploy-backend.result == 'success' && needs.deploy-web.result == 'success' && (needs.deploy-contracts.result == 'success' || needs.deploy-contracts.result == 'skipped')
    steps:
      - name: Write deployment summary
        run: |
          {
            echo "## Production Deployment Summary"
            echo "- Backend: ${{ needs.deploy-backend.result }}"
            echo "- Web: ${{ needs.deploy-web.result }}"
            echo "- Contracts: ${{ needs.deploy-contracts.result }}"
            echo "- Trigger: ${{ github.sha }}"
            echo "- Actor: ${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"
