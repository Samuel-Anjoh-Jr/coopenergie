name: Mobile Expo CI/CD

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  mobile-main-build:
    name: Main Push Mobile Build (Android APK + iOS Internal)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Check EXPO_TOKEN presence
        id: token_check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN is missing. Main mobile build steps will be skipped without failing CI."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN detected."
          fi

      - name: Setup EAS CLI
        if: steps.token_check.outputs.present == 'true'
        run: bunx eas --version

      - name: Build Android APK (staging profile)
        if: steps.token_check.outputs.present == 'true'
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bunx eas build --platform android --profile staging --non-interactive

      - name: Build iOS internal artifact (staging profile)
        if: steps.token_check.outputs.present == 'true'
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bunx eas build --platform ios --profile staging --non-interactive

      - name: Build summary
        run: |
          {
            echo "## Main Branch Mobile Build"
            if [ "${{ steps.token_check.outputs.present }}" = "true" ]; then
              echo "- Trigger: main push"
              echo "- Android: staging APK build started on EAS"
              echo "- iOS: staging internal build started on EAS"
            else
              echo "- Trigger: main push"
              echo "- Skipped: EXPO_TOKEN is not configured in repository secrets"
              echo "- Add EXPO_TOKEN and rerun to start EAS builds"
            fi
            echo "- EAS builds: https://expo.dev/accounts/samuelanjohjr/projects/coopenergie/builds"
          } >> "$GITHUB_STEP_SUMMARY"

  mobile-release-build-submit:
    name: Version Tag Build and Submit (Store)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Check EXPO_TOKEN presence
        id: token_check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN is missing. Release build/submit steps will be skipped without failing CI."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN detected."
          fi

      - name: Validate tag is >= v1.0.0
        id: version_gate
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          LOWEST="1.0.0"
          FIRST="$(printf '%s\n' "$LOWEST" "$VERSION" | sort -V | head -n1)"
          if [ "$FIRST" != "$LOWEST" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is lower than v1.0.0. Skipping release build/submit steps without failing CI."
          else
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup EAS CLI
        if: steps.token_check.outputs.present == 'true' && steps.version_gate.outputs.eligible == 'true'
        run: bunx eas --version

      - name: Build and submit Android (production)
        if: steps.token_check.outputs.present == 'true' && steps.version_gate.outputs.eligible == 'true'
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bunx eas build --platform android --profile production --auto-submit --non-interactive

      - name: Build and submit iOS (production)
        if: steps.token_check.outputs.present == 'true' && steps.version_gate.outputs.eligible == 'true'
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bunx eas build --platform ios --profile production --auto-submit --non-interactive

      - name: Summary
        run: |
          {
            echo "## Mobile Release Triggered"
            echo "- Ref: ${{ github.ref }}"
            if [ "${{ steps.version_gate.outputs.eligible }}" != "true" ]; then
              echo "- Skipped: version tag is lower than v1.0.0"
            elif [ "${{ steps.token_check.outputs.present }}" != "true" ]; then
              echo "- Skipped: EXPO_TOKEN is missing in repository secrets"
            else
              echo "- Android: production build + auto-submit"
              echo "- iOS: production build + auto-submit"
            fi
            echo "- EAS builds/submissions: https://expo.dev/accounts/samuelanjohjr/projects/coopenergie/builds"
          } >> "$GITHUB_STEP_SUMMARY"
